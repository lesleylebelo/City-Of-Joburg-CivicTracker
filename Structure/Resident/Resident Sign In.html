<!DOCTYPE html>
<html lang= "en-ZA">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resident Sign-In</title>
  <link rel="stylesheet" href="/Structure/Resident/Resident Sign In.html" />
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
</head>

<body>
  <header>
      <a href = "../Landing Page.html">Home</a>
      <h3>Resident Access</h3>
  </header>

  <main>
      <form id = "Resident-SignIn-Form">
          <div>
            <label for = "resEmail">Email</label>
            <input type = "email" id = "resEmail" name = "resEmail" placeholder = "Enter Email">
          </div><br>

          <div>
            <label for = "resPassword">Password</label>
            <input type = "password" id = "resPassword" name = "resPassword" placeholder = "Enter Password">
          </div><br>

          <div>
            <button type = "submit">Sign In</button>
          </div>
      </form>

      <div>
        <p id = "Resident-Login-Error"></p>
      </div>

      <div>
        Don't have an account? 
        <a href = "Resident Sign Up.html">Resident Sign Up</a>
      </div>

      <div> 
        <a href = "Forgot Password.html">Forgot Password</a>
      </div>

  </main>
 
  <footer></footer>
  <script src="/Functionality/Resident/Resident Sign In.js"></script>
</body>
</html>
