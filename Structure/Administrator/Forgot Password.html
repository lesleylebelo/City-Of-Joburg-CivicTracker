<!DOCTYPE html>
<html lang= "en-ZA">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Forgot Password</title>
  <link rel="stylesheet" href="/Style/Administrator/Admin Forgot Password.css" />
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
</head>

<body>
  <header>
      <a href = "../Landing Page.html">Home</a>
      <h3>Forgot Password</h3>
  </header>

  <main>
      <form id = "Admin-ForgotPassword-Form">
          <div class="input-group">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="forgotEmail" placeholder="Enter email" />
          <div class="input-icon">
                
          </div>
            <small class="error" id="forgotEmailError"></small>
          </div><br>

          <button type="submit" class="primary-btn">Send Reset Link</button>
      </form>

      <div>
        <p id = "Admin-Reset-Success"></p>
      </div>
  </main>
 
  <footer></footer>
  <script src="/Functionality/Administrator/Forgot Password.js"></script>
</body>
</html>
