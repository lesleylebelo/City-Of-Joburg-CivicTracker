<!DOCTYPE html>
<html lang = "en-ZA">
    <head>
        <meta charset = "UTF-8">
        <meta name = "viewport" content = "width = device-width, initial-scale = 1.0">
        <title>Administrator Sign Up</title>
        <link rel = "stylesheet" href = "../../Style/Administrator/Administrator Sign Up.css">
    </head>
    <body>
         <header>
            <a href = "../../Structure/Landing Page.html">Back to Home</a>
            <h3>Create Administrator Account</h3>
         </header>
         
         <main>
            <form id = "Admin-SignUp-Form">
                <div>
                    <label for = "fnames">Full Names</label>
                    <input type = "text" id = "fnames" name = "fnames"  placeholder = "Enter full names" required>
                </div>

                <br>

                <div>
                    <label for = "empEmail">Email</label>
                    <input type = "email" id = "empEmail" name = "empEmail" placeholder = "Enter Email" required>
                </div>

                <br>

                <div>
                    <label for = "empNumber">Employee Number</label>
                    <input type = "number" id = "empNumber" name = "empNumber" placeholder = "Enter Employee Number" required>
                </div>

                <br>

                <div>
                    <label for = "empPassword">Password</label>
                    <input type = "password" id = "empPassword" name = "empPassword" placeholder = "Enter Password" required>
                </div>

                <br>

                <div>
                    <label for = "empConfirmPassword">Confirm Password</label>
                    <input type = "password" id = "empConfirmPassword" name = "empConfirmPassword" placeholder = "Re-enter Password" required>
                </div>

                <br>

                <div>
                     <button type = "submit" id = "Admin-SignUp-Btn">Sign Up</button>
                </div>
            </form>

            <div>
                <p id = "Admin-SignUp-Error"></p>
            </div>
         </main>

         <footer></footer>
         <script src = "../../Functionality/Administrator/Administrator Sign Up.js"></script>
    </body>
</html>
