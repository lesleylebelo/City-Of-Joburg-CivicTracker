<!DOCTYPE html>
<html lang = "en-ZA">
    <head>
        <meta charset = "UTF-8">
        <meta name = "viewport" content = "width = device-width, initial-scale = 1.0">
        <title>Administrator Sign Up</title>
    </head>
    <body>
         <header>
            <a href = "#">Back to Home</a>
            <h3>Create Administrator Account</h3>
         </header>
         
         <main>
            <form>
                <div>
                    <label for = "fnames">Full Names</label>
                    <input type = "text" id = "fnames" name = "fnames"  placeholder = "Enter full names" required>
                </div>

                <br>

                <div>
                    <label for = "EmpMail">Email</label>
                    <input type = "email" id = "EmpMail" name = "EmpMail" placeholder = "Enter Email" required>
                </div>

                <br>

                <div>
                    <label for = "EmpID">Employee ID</label>
                    <input type = "number" id = "EmpID" name = "EmpID" placeholder = "Enter ID" required>
                </div>

                <br>

                <div>
                    <label for = "EmpPass">Password</label>
                    <input type = "password" id = "EmpPass" name = "EmpPass" placeholder = "Enter Password" required>
                </div>

                <br>

                <div>
                    <label for = "EmpConPass">Confirm Password</label>
                    <input type = "password" id = "EmpConPass" name = "EmpConPass" placeholder = "Re-enter Password" required>
                </div>

                <br>

                <div>
                    <a href = "Administrator Sign In.html">
                        <button>Sign Up</button>
                    </a>
                </div>
            </form>
         </main>
    </body>
    <footer></footer>
</html>
