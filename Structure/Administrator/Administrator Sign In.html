<!DOCTYPE html>

        <meta name = "viewport" content = "width = device-width, initial-scale = 1.0">
        <title>Administrator Sign In</title>
    </head>
    <body>
         <header>
            <a href = "#">Back to Home</a>
            <h3>Administrator Access</h3>

         <main>
            <form>
                <div>
                    <label for = "EmpID/Email">Employee ID / Email</label>
                    <input type = "text" id = "EmpID/Email" name = "EmpID/Email" placeholder = "Enter ID or Email" required>
                </div>

                <br>

                <div>
                    <label for = "EmpPassword">Password</label>
                    <input type = "password" id = "EmpPassword" name = "EmpPassword" placeholder = "Enter Password" required>
                </div>

                <div>
                    Don't have an account? 
                    <a href = "Administrator Account Registration.html">Admin Sign Up</a>
                </div>

                <br>

                <div>
                    <a href = "#">
                        <button>Sign In</button>
                    </a>
                </div>
            </form>
         </main>
    </body>
    <footer></footer>
</html>
