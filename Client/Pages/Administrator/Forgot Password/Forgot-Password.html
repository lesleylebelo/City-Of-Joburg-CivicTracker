<!DOCTYPE html>
<html lang="en-ZA">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Forgot Password | CivicTrack Admin</title>
        <link rel="stylesheet" href="Admin_forgot_pass.css">
    </head>
    <body>
        <header>
            <a href="Admin_sign_in.html">Back to Sign In</a>
            <h3>Password Recovery</h3>
        </header>

        <main>
            <form id="Admin-Forgot-Password-Form">

                <!-- Step 1: Enter Employee Number & Email -->
                <div id="step-identity">
                    <h2>Forgot Password</h2>
                    <p class="subtitle">Enter your Employee Number and registered email to receive a reset code.</p>

                    <div>
                        <label for="adminForgotEmpNum">Employee Number</label>
                        <input type="number" id="adminForgotEmpNum" name="adminForgotEmpNum" placeholder="Enter your employee number" required>
                    </div>

                    <div>
                        <label for="adminForgotEmail">Email Address</label>
                        <input type="email" id="adminForgotEmail" name="adminForgotEmail" placeholder="Enter your registered email" required>
                    </div>

                    <div>
                        <button type="button" id="Admin-Send-Code-Btn">Send Reset Code</button>
                    </div>
                </div>

                <!-- Step 2: Enter OTP Code -->
                <div id="step-otp" style="display:none;">
                    <h2>Enter Code</h2>
                    <p class="subtitle">A 6-digit code has been sent to your email address.</p>

                    <div>
                        <label for="adminOtpCode">Verification Code</label>
                        <input type="text" id="adminOtpCode" name="adminOtpCode" placeholder="Enter 6-digit code" maxlength="6" required>
                    </div>

                    <div>
                        <button type="button" id="Admin-Verify-Code-Btn">Verify Code</button>
                    </div>

                    <div class="link-row">
                        Didn't receive a code?
                        <a href="#" id="Admin-Resend-Code-Link">Resend</a>
                    </div>
                </div>

                <!-- Step 3: Set New Password -->
                <div id="step-reset" style="display:none;">
                    <h2>New Password</h2>
                    <p class="subtitle">Create a strong new password for your administrator account.</p>

                    <div>
                        <label for="adminNewPassword">New Password</label>
                        <input type="password" id="adminNewPassword" name="adminNewPassword" placeholder="Enter new password" required>
                    </div>

                    <div>
                        <label for="adminConfirmNewPassword">Confirm New Password</label>
                        <input type="password" id="adminConfirmNewPassword" name="adminConfirmNewPassword" placeholder="Re-enter new password" required>
                    </div>

                    <div>
                        <button type="submit" id="Admin-Reset-Password-Btn">Reset Password</button>
                    </div>
                </div>

            </form>

            <div>
                <p id="Admin-Forgot-Password-Error"></p>
                <p id="Admin-Forgot-Password-Success"></p>
            </div>
        </main>

        <footer></footer>

        <script src="Admin_forgot_Pass.js"></script>
    </body>
</html>
