

<!DOCTYPE html>
<html lang="en-ZA">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Forgot Password | CivicTrack</title>
        <link rel="stylesheet" href="Res_Forgot_Pass.css">
    </head>
    <body>
        <header>
            <a href="Resident_Sign_In.html">Back to Sign In</a>
            <h3>Password Recovery</h3>
        </header>

        <main>
            <!-- Step 1: Enter Email -->
            <form id="Forgot-Password-Form">

                <div id="step-email">
                    <h2>Forgot Password</h2>
                    <p class="subtitle">Enter your registered email address and we'll send you a reset code.</p>

                    <div>
                        <label for="forgotEmail">Email Address</label>
                        <input type="email" id="forgotEmail" name="forgotEmail" placeholder="Enter your email address" required>
                    </div>

                    <div>
                        <button type="button" id="Send-Code-Btn">Send Reset Code</button>
                    </div>
                </div>

                <!-- Step 2: Enter OTP Code -->
                <div id="step-otp" style="display:none;">
                    <h2>Enter Code</h2>
                    <p class="subtitle">A 6-digit code has been sent to your email address.</p>

                    <div>
                        <label for="otpCode">Verification Code</label>
                        <input type="text" id="otpCode" name="otpCode" placeholder="Enter 6-digit code" maxlength="6" required>
                    </div>

                    <div>
                        <button type="button" id="Verify-Code-Btn">Verify Code</button>
                    </div>

                    <div class="link-row">
                        Didn't receive a code?
                        <a href="#" id="Resend-Code-Link">Resend</a>
                    </div>
                </div>

                <!-- Step 3: Set New Password -->
                <div id="step-reset" style="display:none;">
                    <h2>New Password</h2>
                    <p class="subtitle">Create a strong new password for your account.</p>

                    <div>
                        <label for="newPassword">New Password</label>
                        <input type="password" id="newPassword" name="newPassword" placeholder="Enter new password" required>
                    </div>

                    <div>
                        <label for="confirmNewPassword">Confirm New Password</label>
                        <input type="password" id="confirmNewPassword" name="confirmNewPassword" placeholder="Re-enter new password" required>
                    </div>

                    <div>
                        <button type="submit" id="Reset-Password-Btn">Reset Password</button>
                    </div>
                </div>

            </form>

            <div>
                <p id="Forgot-Password-Error"></p>
                <p id="Forgot-Password-Success"></p>
            </div>
        </main>

        <footer></footer>

        <script src="Res_Forgot_Pass.js"></script>
    </body>
</html>
