<!DOCTYPE html>
<html lang = "en-ZA">
    <head>
        <meta charset = "UTF-8">
        <meta name = "viewport" content = "width = device-width, initial-scale = 1.0">
        <title>Administrator Sign In</title>
        <link rel = "stylesheet" href = "Sign-In.css">
    </head>
    <body>
         <header>
            <a href = "../../Public/Landing/Landing.html">Back to Home</a>
            <h3>Administrator Access</h3>
         </header>

         <main>
            <form id = "Admin-SignIn-Form">
                <div>
                    <label for = "empNum">Employee Number</label>
                    <input type = "number" id = "empNum" name = "empNum" placeholder = "Enter Employee Number">
                </div>

                <br>

                <div>
                    <label for = "empPassword">Password</label>
                    <input type = "password" id = "empPassword" name = "empPassword" placeholder = "Enter Password">
                </div>

                <div>
                    Don't have an account? 
                    <a href = "../Sign-Up/Sign-Up.html">Admin Sign Up</a>
                </div>

                <div>
                    Forgot your password?
                    <a href = "../Forgot Password/Forgot Password.html">Reset Password</a>
                </div>

                <br>

                <div>
                     <button type = "submit">Sign In</button>
                </div>
            </form>

            <div>
                <p id = "Admin-Login-Error"></p>
            </div>

         </main>

         <script src = "Sign-In.js"></script>
    </body>
    <footer></footer>
</html>
